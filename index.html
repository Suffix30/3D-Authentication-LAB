<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Authentication LAB</title>
    <link rel="stylesheet" href="./src/index.css">
</head>
<body>
    <div id="info">
        Network Traffic Monitor<br>
        <span id="attempts">Login Attempts: 0</span><br>
        <span id="status">Status: Monitoring</span>
    </div>
    <div id="level-info">Level 1: Basic Authentication (Easy)</div>
    <div id="form"></div>
    <button id="help-toggle" title="Walkthrough">?</button>
    <div id="help-panel" class="hidden">
        <div id="help-header">
            <span id="help-title">Walkthrough</span>
            <button id="help-close">&times;</button>
        </div>
        <div id="help-body">
            <div id="help-learn"></div>
            <div id="help-hints"></div>
            <div id="help-answer" class="hidden"></div>
        </div>
        <div id="help-actions">
            <button id="help-next-hint">Next Hint</button>
            <button id="help-show-answer" class="hidden">Show Answer</button>
        </div>
    </div>
    <script type="module" src="./src/main.js"></script>
</body>
</html>
